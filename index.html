<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Monte Carlo Path Tracer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
    canvas#canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    #gizmo {
      position: fixed; top: 12px; right: 12px;
      width: 120px; height: 120px;
      pointer-events: none; z-index: 10;
    }
    #info {
      position: fixed; top: 12px; left: 12px;
      color: #0f0; font-size: 13px;
      background: rgba(0,0,0,0.7); padding: 8px 12px;
      border-radius: 4px; pointer-events: none;
      line-height: 1.6; z-index: 10;
    }
    #error {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #f44; font-size: 18px; text-align: center;
      display: none; max-width: 600px; line-height: 1.5; z-index: 10;
    }
    /* Virtual joysticks — relative positioning, appear where you touch */
    .stick-zone {
      position: fixed; width: 140px; height: 140px;
      border-radius: 50%; z-index: 5;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      display: none; /* shown by JS on touch */
      pointer-events: none;
    }
    .stick-knob {
      position: absolute; width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.4);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: background 0.1s;
    }
    .stick-knob.active {
      background: rgba(255,255,255,0.45);
    }
    .stick-label { display: none; }
    #options-menu {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: none; justify-content: center; align-items: center;
      z-index: 20;
    }
    #options-menu.open { display: flex; }
    .menu-panel {
      background: rgba(18,18,22,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 20px 24px;
      width: 340px; max-width: 90vw; max-height: 85vh;
      overflow-y: auto;
      color: #ccc; font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .menu-hdr {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; font-size: 15px; font-weight: bold; color: #fff;
    }
    .menu-close {
      background: none; border: none; color: #666;
      font-size: 20px; cursor: pointer; padding: 2px 8px; border-radius: 4px;
    }
    .menu-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .menu-sec { margin-bottom: 14px; }
    .menu-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: #0c0; margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .menu-row {
      display: flex; align-items: center; margin-bottom: 8px; gap: 8px;
    }
    .menu-row label { flex: 0 0 110px; font-size: 12px; color: #aaa; }
    .menu-row input[type="range"] { flex: 1; height: 3px; accent-color: #0c0; cursor: pointer; }
    .menu-row select {
      flex: 1; background: rgba(255,255,255,0.08); color: #ddd;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
      padding: 4px 8px; font-size: 12px; font-family: 'Courier New', monospace; cursor: pointer;
    }
    .menu-row select:focus { outline: 1px solid #0c0; }
    .menu-val { flex: 0 0 42px; text-align: right; font-size: 11px; color: #666; }
    .menu-hint { text-align: center; font-size: 10px; color: #444; margin-top: 12px; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="gizmo" width="120" height="120"></canvas>
  <div id="info">Initializing WebGPU...</div>
  <div id="error"></div>
  <div id="options-menu">
    <div class="menu-panel">
      <div class="menu-hdr">
        <span>Options</span>
        <button class="menu-close" id="menu-close">&times;</button>
      </div>
      <div class="menu-sec">
        <div class="menu-title">Quality</div>
        <div class="menu-row">
          <label>FSR Mode</label>
          <select id="opt-fsr">
            <option value="performance">Performance (2x)</option>
            <option value="balanced">Balanced (1.7x)</option>
            <option value="quality">Quality (1.5x)</option>
            <option value="dlaa">DLAA (1x)</option>
          </select>
        </div>
        <div class="menu-row">
          <label>Sharpness</label>
          <input type="range" id="opt-sharp" min="0" max="100" value="60">
          <span class="menu-val" id="val-sharp">0.60</span>
        </div>
      </div>
      <div class="menu-sec">
        <div class="menu-title">Lighting</div>
        <div class="menu-row">
          <label>Sun Elevation</label>
          <input type="range" id="opt-sun-el" min="10" max="85" value="58">
          <span class="menu-val" id="val-sun-el">58&deg;</span>
        </div>
        <div class="menu-row">
          <label>Sun Azimuth</label>
          <input type="range" id="opt-sun-az" min="0" max="360" value="53">
          <span class="menu-val" id="val-sun-az">53&deg;</span>
        </div>
      </div>
      <div class="menu-sec">
        <div class="menu-title">Camera</div>
        <div class="menu-row">
          <label>Move Speed</label>
          <input type="range" id="opt-speed" min="1" max="300" value="30">
          <span class="menu-val" id="val-speed">3.0</span>
        </div>
        <div class="menu-row">
          <label>FOV</label>
          <input type="range" id="opt-fov" min="30" max="120" value="75">
          <span class="menu-val" id="val-fov">75&deg;</span>
        </div>
      </div>
      <div class="menu-sec">
        <div class="menu-title">Post-Processing</div>
        <div class="menu-row">
          <label>Temporal Blend</label>
          <input type="range" id="opt-temporal" min="5" max="100" value="20">
          <span class="menu-val" id="val-temporal">0.020</span>
        </div>
      </div>
      <div class="menu-hint">ESC to close &#8226; Three-finger tap on mobile</div>
    </div>
  </div>
  <div class="stick-zone left" id="stick-left">
    <div class="stick-knob" id="knob-left"></div>
    <div class="stick-label">MOVE</div>
  </div>
  <div class="stick-zone right" id="stick-right">
    <div class="stick-knob" id="knob-right"></div>
    <div class="stick-label">LOOK</div>
  </div>
  <script>
    function _log(m, isErr) {
      fetch('/log', { method:'POST', body: m }).catch(function(){});
      if (isErr) {
        var e = document.getElementById('error');
        if (e) { e.style.display='block'; e.textContent=m; }
      }
    }
    window.onerror = function(msg,src,line){ _log('ERR:'+msg+' @'+src+':'+line, true); };
    _log('HTML loaded');
  </script>
  <script type="module">
    import('./renderer.js').catch(function(e) {
      _log('MODULE_FAIL: ' + e.message, true);
    });
  </script>
</body>
</html>
